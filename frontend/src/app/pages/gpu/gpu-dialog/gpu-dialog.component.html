<h1 mat-dialog-title>{{ isEditMode ? 'Edit GPU' : 'Add GPU' }}</h1>
<div mat-dialog-content>
  <form [formGroup]="gpuForm">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Manufacturer</mat-label>
      <input matInput formControlName="manufacturer" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Memory (GB)</mat-label>
      <input matInput type="number" formControlName="memory" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="gpuForm.invalid" (click)="onSubmit()">
    {{ isEditMode ? 'Update' : 'Create' }}
  </button>
</div>
