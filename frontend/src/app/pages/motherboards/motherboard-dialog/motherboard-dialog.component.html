<h2 mat-dialog-title>
  {{ data ? 'Edit Motherboard' : 'Add Motherboard' }}
</h2>
<div mat-dialog-content>
  <form [formGroup]="motherboardForm">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" required />
      <mat-error *ngIf="motherboardForm.get('name')?.hasError('required')">Name is required.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Brand</mat-label>
      <input matInput formControlName="brand" required />
      <mat-error *ngIf="motherboardForm.get('brand')?.hasError('required')">Brand is required.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Socket Type</mat-label>
      <input matInput formControlName="socketType" required />
      <mat-error *ngIf="motherboardForm.get('socketType')?.hasError('required')">Socket Type is required.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Form Factor</mat-label>
      <input matInput formControlName="formFactor" required />
      <mat-error *ngIf="motherboardForm.get('formFactor')?.hasError('required')">Form Factor is required.</mat-error>
    </mat-form-field>
  </form>
</div>

<div mat-dialog-actions>
  <button mat-button color="warn" (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onSubmit()" [disabled]="!motherboardForm.valid">Save</button>
</div>
