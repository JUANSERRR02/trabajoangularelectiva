<h2 mat-dialog-title>{{ isEditMode ? 'Edit PSU' : 'Add PSU' }}</h2>
<div mat-dialog-content>
  <form [formGroup]="psuForm">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Wattage (W)</mat-label>
      <input matInput type="number" formControlName="wattage" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Efficiency Rating</mat-label>
      <input matInput formControlName="efficiencyRating" />
    </mat-form-field>

    <mat-checkbox formControlName="modular">Modular</mat-checkbox>

  </form>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="psuForm.invalid" (click)="onSubmit()">Save</button>
</div>
